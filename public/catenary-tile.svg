<svg xmlns="http://www.w3.org/2000/svg" width="720" height="1000" viewBox="0 0 720 1000">
  <defs>
    <linearGradient id="steel" x1="0" x2="1">
      <stop offset="0" stop-color="#171b1d"/>
      <stop offset=".42" stop-color="#5d6261"/>
      <stop offset=".58" stop-color="#292e30"/>
      <stop offset="1" stop-color="#0d1012"/>
    </linearGradient>
    <filter id="soft" x="-10%" y="-5%" width="120%" height="110%">
      <feGaussianBlur stdDeviation="0.45"/>
    </filter>
  </defs>

  <!-- Messenger and contact wires, with a restrained natural sag. -->
  <g fill="none" stroke-linecap="round" filter="url(#soft)">
    <path d="M0 128 Q360 153 720 128" stroke="#171a1b" stroke-width="3.2"/>
    <path d="M0 232 Q360 246 720 232" stroke="#111415" stroke-width="2.8"/>
    <path d="M80 136 L80 233 M200 145 L200 238 M320 150 L320 242 M440 147 L440 240 M560 138 L560 235 M680 130 L680 232"
      stroke="#222728" stroke-width="1.35"/>
  </g>

  <!-- Galvanised lattice mast, base plate and real cantilever geometry. -->
  <g opacity=".96" filter="url(#soft)">
    <path d="M615 100 L646 100 L657 982 L603 982 Z" fill="url(#steel)"/>
    <path d="M620 116 L641 116 M619 168 L643 168 M617 225 L645 225 M614 292 L647 292 M612 372 L649 372 M610 468 L651 468 M608 580 L653 580 M606 708 L655 708 M604 850 L656 850"
      stroke="#777b78" stroke-width="2" opacity=".48"/>
    <path d="M619 116 L643 168 L617 225 L647 292 L612 372 L651 468 L608 580 L655 708 L604 850 L656 920"
      fill="none" stroke="#0b0e10" stroke-width="3.5" opacity=".82"/>
    <path d="M641 116 L619 168 L645 225 L614 292 L649 372 L610 468 L653 580 L606 708 L656 850 L604 920"
      fill="none" stroke="#8a8d88" stroke-width="2.2" opacity=".38"/>
    <rect x="587" y="972" width="88" height="16" rx="2" fill="#121517"/>
    <rect x="596" y="987" width="70" height="8" rx="2" fill="#343839"/>

    <!-- Upper crossbeam and diagonal brace. -->
    <path d="M292 116 L647 116 L647 132 L292 132 Z" fill="url(#steel)"/>
    <path d="M356 132 L615 239" stroke="#24292a" stroke-width="9"/>
    <path d="M357 132 L614 239" stroke="#737773" stroke-width="2.2" opacity=".52"/>
    <path d="M616 198 L424 232" stroke="#1b2021" stroke-width="8"/>
    <path d="M614 198 L425 232" stroke="#747974" stroke-width="2" opacity=".5"/>

    <!-- Ceramic insulators and registration arm. -->
    <g transform="translate(426 230) rotate(-9)">
      <rect x="0" y="-4" width="96" height="8" rx="3" fill="#222728"/>
      <g fill="#777872" stroke="#222627" stroke-width="1.5">
        <ellipse cx="18" cy="0" rx="8" ry="12"/>
        <ellipse cx="35" cy="0" rx="8" ry="12"/>
        <ellipse cx="52" cy="0" rx="8" ry="12"/>
      </g>
    </g>
    <path d="M425 232 L402 245 L382 245" fill="none" stroke="#101314" stroke-width="4"/>
    <circle cx="382" cy="245" r="5" fill="#171a1b"/>

    <!-- Small mast hardware breaks the silhouette at close range. -->
    <rect x="600" y="332" width="23" height="34" rx="2" fill="#262b2c"/>
    <circle cx="611" cy="343" r="3" fill="#8b8d87" opacity=".55"/>
    <circle cx="611" cy="356" r="3" fill="#8b8d87" opacity=".55"/>
  </g>
</svg>
